<!--
  Time-of-day router.
  • 06:00–17:59 visitor local time  → /v6.html  (light)
  • 18:00–05:59 visitor local time  → /v5.html  (dark)
  Falls back to /v6.html for crawlers and no-JS clients via meta refresh.
  All decisions happen client-side — safe for GitHub Pages static hosting.
-->
<meta http-equiv="refresh" content="0; url=/v6.html">

<style>
  html, body { background: #FFFFFF; color: #0A0A0A; margin: 0; height: 100%; }
  body { display: flex; align-items: center; justify-content: center; font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  a { color: inherit; text-decoration: none; border-bottom: 1px solid currentColor; padding-bottom: 2px; }
  @media (prefers-color-scheme: dark) {
    html, body { background: #18181B; color: #F4EFE6; }
  }
</style>
</head>
<body>
  <noscript><a href="/v6.html">Enter CineSmithPro →</a></noscript>
  <script>
    (function () {
      try {
        var h = new Date().getHours();           // visitor's local hour, timezone-aware
        var isDay = (h >= 6 && h < 18);          // 06:00–17:59 → light, else dark
        var target = isDay ? '/v6.html' : '/v5.html';
        window.location.replace(target);
      } catch (e) {
        window.location.replace('/v6.html');     // safest fallback
      }
    })();
  </script>
</body>
